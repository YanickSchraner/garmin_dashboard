services:
  garmin-dashboard-backend:
    extends:
      file: docker/services.compose.yml
      service: garmin-dashboard-backend
    restart: unless-stopped
    env_file:
      - .env

  garmin-dashboard-frontend:
    extends:
      file: docker/services.compose.yml
      service: garmin-dashboard-frontend
    restart: unless-stopped
    environment:
      # SSR inside Docker reaches backend via unique container name on web_proxy network
      # Now requires /api prefix as the backend routes are unified
      NUXT_API_BASE_INTERNAL: http://garmin-dashboard-backend:8000/api
      # Browser URL — must now point to the relative /api prefix handled by Caddy
      NUXT_PUBLIC_API_BASE: /api

volumes:
  garmin-tokens:
    external: false

networks:
  web_proxy:
    external: true
