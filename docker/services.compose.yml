services:
  backend:
    build:
      context: ..
      dockerfile: Dockerfile
    image: garmin-dashboard-backend
    volumes:
      - garmin-tokens:/home/appuser/.garminconnect
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import http.client; conn = http.client.HTTPConnection(\"localhost\", 8000); conn.request(\"GET\", \"/health\"); r = conn.getresponse(); exit(0 if r.status == 200 else 1)'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    image: garmin-dashboard-frontend
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  garmin-tokens:
